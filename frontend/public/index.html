<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les Matinées du Bac</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #ff6b57 0%, #ffb26b 100%); color: white; padding: 20px 40px; }
    .header h1 { font-size: 28px; margin-bottom: 20px; }
    nav { display: flex; gap: 30px; }
    nav button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    nav button:hover { background: rgba(255,255,255,0.3); }
    .main { max-width: 1200px; margin: 40px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .main h2 { margin-bottom: 20px; font-size: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 40px 0; }
    .stat-card { padding: 24px; background: linear-gradient(135deg, #ff6b57 0%, #ffb26b 100%); color: white; border-radius: 12px; text-align: center; }
    .stat-card h3 { font-size: 14px; margin-bottom: 12px; }
    .stat-card p { font-size: 48px; font-weight: 800; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🌅 Les Matinées du Bac</h1>
    <nav>
      <button>Dashboard</button>
      <button>Nouvelle correction</button>
      <button>Programmer visio</button>
    </nav>
  </header>

  <main class="main">
    <h2>📊 Mon Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Élèves</h3>
        <p>12</p>
      </div>
      <div class="stat-card">
        <h3>Corrections ce mois</h3>
        <p>18</p>
      </div>
      <div class="stat-card">
        <h3>Revenus</h3>
        <p>450€</p>
      </div>
    </div>
  </main>
</body>
</html>
